name: Build Mod
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup NDK
        uses: nttld/setup-ndk@v1.5
        with:
          ndk-version: r26c

      - name: Download zygisk.hpp
        run: |
          mkdir -p overlay/libs/zygisk
          curl -L https://raw.githubusercontent.com/topjohnwu/zygisk-module-sample/master/module/jni/zygisk.hpp \
               -o overlay/libs/zygisk/zygisk.hpp

      - name: Build
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-26 \
                -DANDROID_STL=c++_shared \
                ..
          make
          
      - name: Create Zip
        run: |
          mkdir -p output/zygisk
          cp build/libminimap.so output/zygisk/arm64-v8a.so
          cp module.prop output/
          cd output && zip -r ../rov-esp-mod.zip .
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rov-esp-mod
          path: rov-esp-mod.zip
